<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>AWS DevOps Internship Assignment</title>

    <style>
        *{

            background:#eef3f9;
            display:flex;
            justify-content:center;

        .card{

        }

        h1{

            text-align:center;
            margin-bottom:35px;
            font-size:42px;
        }

        p{
            font-size:24px;
            line-height:2;
            color:#222;
        }

        span{
            font-weight:bold;
        }

        hr{
            margin:30px 0 20px;
            border:none;
            border-top:1px solid #ddd;
        }

        .footer{
            text-align:center;
            color:#666;
            font-size:16px;
        }

        @media(max-width:700px){

            .card{
                width:100%;
                padding:25px;
            }

            h1{
                font-size:34px;
            }
